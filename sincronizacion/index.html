<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronización DB</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Sincronización MySQL - PostgreSQL</h1>

    <!-- CONEXIONES -->
    <section class="conexion-container">

        <button id="btnMysql">
            Conectar MySQL
        </button>

        <button id="btnPostgres">
            Conectar PostgreSQL
        </button>

        <button id="btnSync">
            Sincronizar
        </button>

    </section>

    <hr>

    <!-- FORMULARIO -->
    <section class="form-container">

        <h2>Empleado</h2>

        <form id="empleadoForm">

            <input type="text" id="dpi" placeholder="DPI" maxlength="13">

            <input type="text" id="primer_nombre" placeholder="Primer Nombre">

            <input type="text" id="segundo_nombre" placeholder="Segundo Nombre">

            <input type="text" id="primer_apellido" placeholder="Primer Apellido">

            <input type="text" id="segundo_apellido" placeholder="Segundo Apellido">

            <textarea id="direccion" placeholder="Dirección"></textarea>

            <input type="text" id="telefono_casa" placeholder="Teléfono Casa" maxlength="8">

            <input type="text" id="telefono_movil" placeholder="Teléfono Móvil" maxlength="8">

            <input type="number" step="0.01" id="salario_base" placeholder="Salario Base">

            <input type="number" id="bonificacion" placeholder="Bonificación">

            <div class="buttons">

                <button type="submit">
                    Guardar
                </button>

                <button type="button" id="btnActualizar">
                    Actualizar
                </button>

                <button type="button" id="btnEliminar">
                    Eliminar
                </button>

            </div>

        </form>

    </section>

    <script src="app.js"></script>

</body>

</html>
